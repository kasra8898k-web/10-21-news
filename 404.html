<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>۱۰.۲۱ نیوز | 10.21 NEWS</title>
  <script>
    // SPA redirect: on GitHub Pages 404, redirect to index.html with hash routing
    (function() {
      var l = window.location;
      var segments = l.pathname.split('/').filter(Boolean);
      var appPath = segments.slice(1).join('/');
      var base = l.origin + '/' + (segments[0] || '') + '/';
      if (appPath) {
        l.replace(base + '#/' + appPath + (l.search ? l.search : '') + l.hash);
      } else {
        l.replace(base);
      }
    }());
  </script>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;">
    <p>Redirecting...</p>
  </div>
</body>
</html>
